<!DOCTYPE html>
<html>
<head>
    <title>Register - IQ Master</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .register-wrap {
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-wrap h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .register-wrap p.subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .divider:not(:empty)::before {
            margin-right: 12px;
        }

        .divider:not(:empty)::after {
            margin-left: 12px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .footer-text a {
            color: #5ec8f8;
            font-weight: 600;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="hero">

    <div class="glass-card register-wrap" style="max-width:500px;">

        <h1>💬 Create Account</h1>
        <p class="subtitle">Join thousands testing their intelligence</p>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required
                   class="input-box">

            <br><br>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required
                   class="input-box">

            <br><br>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required
                   class="input-box">

            <br><br>

            <button type="submit" class="btn">
                Create Account
            </button>

        </form>

        <div class="divider">or</div>

        <a href="{{ url_for('google_login') }}" class="google-btn">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
                <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.167 6.656 3.58 9 3.58z"/>
            </svg>
            Continue with Google
        </a>

        <p class="footer-text">
            Already have an account? <a href="/login">Login</a>
        </p>

    </div>

</div>

</body>
</html>

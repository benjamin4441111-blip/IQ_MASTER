<!DOCTYPE html>
<html>
<head>
    <title>Login - IQ Master</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="hero">

    <div class="glass-card" style="max-width:500px;">

        <h1>🔐 Login</h1>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required
                   class="input-box">

            <br><br>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required
                   class="input-box">

            <br><br>

            <button type="submit" class="btn">
                Login
            </button>

        </form>

        <br>

        <p>
            Don't have an account?
            <a href="/register">Register</a>
        </p>

    </div>

</div>

</body>
</html>
